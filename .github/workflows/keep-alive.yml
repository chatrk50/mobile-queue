name: keep-alive

# Keeps the Render free services warm so they don't spin down (~15 min idle -> ~50s cold
# start, which on the till looks like "the order took forever / I tapped twice").
#
# GitHub scheduled crons are best-effort and often delayed, so instead of relying on a ping
# *exactly* every N minutes, each run is a single job that LOOPS — pinging every 3 minutes for
# ~55 minutes. The hourly cron just (re)starts that loop. Net effect: near-continuous pings
# during the day with at most a ~5-min gap, well under Render's ~15-min idle timeout.
# This repo is PUBLIC, so Actions minutes are unlimited/free — the long-running job is fine.
#
# Hours: Asia/Bangkok ~06:00–24:00 (the shop's waking hours). For belt-and-suspenders 24/7
# warmth, an external monitor (cron-job.org / UptimeRobot, free) can also hit /api/config.

on:
  schedule:
    - cron: '0 23 * * *'      # 06:00 Asia/Bangkok
    - cron: '0 0-16 * * *'    # 07:00–23:59 Asia/Bangkok (hourly)
  workflow_dispatch:          # allow manual run from the Actions tab

# One warming loop at a time; let a running loop finish rather than cancelling it.
concurrency:
  group: keep-alive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - name: Keep services warm (ping every 3 min for ~55 min)
        env:
          URLS: "https://mobile-queue.onrender.com/api/config https://mobile-queue-uat.onrender.com/api/config"
        run: |
          deadline=$((SECONDS + 3300))   # ~55 minutes, then a fresh hourly run takes over
          while [ "$SECONDS" -lt "$deadline" ]; do
            for u in $URLS; do
              code=$(curl -fsS --max-time 60 -o /dev/null -w '%{http_code}' "$u" || echo "000")
              echo "$(date -u +%H:%M:%S)Z  $u -> $code"
            done
            sleep 180
          done
          echo "loop done at $(date -u)"
