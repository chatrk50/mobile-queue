name: CI

# Runs the full test suite + a dependency-vulnerability gate on every push / PR.
# Catches regressions and known-vulnerable deps before they reach a deploy branch.
on:
  push:
    branches: [main, staging, saas]
  pull_request:
    branches: [main, staging, saas]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Test-only values (NOT secrets). SaaS mode fail-closes without SESSION_SECRET, so the
      # boot/tests need these present; real secrets live in the host env, never here.
      SESSION_SECRET: ci-test-session-secret-0123456789
      SAAS_ADMIN_PIN: adminsecret
      SIGNUP_MAX: '1000'        # the dry-run/hierarchy suites sign up many brands from one IP
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability gate
        run: npm audit --audit-level=high

      - name: In-process tests
        # Each DB-backed suite gets its OWN fresh data dir — they assume an empty DB on start, so a
        # shared dir would let one suite's tenants leak into the next (signup slug collisions, etc.).
        run: |
          for t in test:e2e test:tenant test:isolation test:billing test:restore; do
            echo "::group::$t"
            QUEUE_DATA_DIR=$(mktemp -d) npm run -s "$t"
            echo "::endgroup::"
          done
          npm run -s test:totp
          npm run -s test:2fa

      - name: Boot SaaS servers (for the live integration suites)
        run: |
          SAAS=1 PORT=4633 QUEUE_DATA_DIR=$(mktemp -d) node server/index.js & echo $! > /tmp/srv-h.pid
          SAAS=1 PORT=4611 QUEUE_DATA_DIR=$(mktemp -d) node server/index.js & echo $! > /tmp/srv-d.pid
          for url in http://localhost:4633/api/config http://localhost:4611/api/config; do
            up=0
            for i in $(seq 1 60); do
              if curl -sf "$url" >/dev/null; then up=1; break; fi
              sleep 0.25
            done
            if [ "$up" != "1" ]; then echo "::error::server at $url did not start"; exit 1; fi
          done

      - name: Hierarchy + dry-run integration
        run: |
          npm run -s test:hierarchy
          npm run -s dryrun

      - name: Stop servers
        if: always()
        run: |
          kill "$(cat /tmp/srv-h.pid 2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/srv-d.pid 2>/dev/null)" 2>/dev/null || true
