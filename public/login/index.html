<!doctype html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"><link rel="icon" type="image/png" href="/assets/logo.png">
<title>เข้าสู่ระบบ — KhaiDee</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap');
  :root{--ind:#6366f1;--inds:rgba(99,102,241,.10);--ink:#1a1a2e;--mut:#6b7280;--line:#e6e7ec;--bg:#f7f7fb}
  *{box-sizing:border-box}
  body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);margin:0}
  .wrap{max-width:400px;margin:0 auto;padding:42px 18px}
  .hero{text-align:center;margin:0 0 22px}
  .logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(180deg,#6f72f5,var(--ind));color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 12px;font-family:'Kanit',sans-serif;font-weight:700;box-shadow:0 8px 20px rgba(99,102,241,.35)}
  .hero h1{margin:0;font-size:23px;font-weight:600;font-family:'Kanit','IBM Plex Sans Thai',sans-serif;letter-spacing:-.02em}
  .hero p{color:var(--mut);margin:6px 0 0;font-size:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px}
  label{display:block;font-weight:500;font-size:13px;margin:12px 0 5px}
  input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);transition:.15s}
  input:focus{outline:none;border-color:var(--ind);box-shadow:0 0 0 3px var(--inds)}
  button.go{width:100%;margin-top:18px;font-size:15px;font-weight:500;padding:13px;background:var(--ind);color:#fff;border:none;border-radius:12px;font-family:inherit;cursor:pointer}
  button.go:hover{background:#5457e0}button.go:disabled{opacity:.5}
  .divider{display:flex;align-items:center;gap:12px;color:var(--mut);font-size:12px;margin:18px 0}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
  .err{color:#dc2626;font-size:13px;margin-top:8px;min-height:18px;text-align:center}
  .shop{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer}
  .shop:hover{border-color:var(--ind);background:var(--inds)}
  a{color:var(--ind)}
</style>
</head><body>
<div class="wrap">
  <div class="hero">
    <a href="/landing/" style="text-decoration:none"><div class="logo">ดี</div></a>
    <h1>เข้าสู่ระบบ ขายดี</h1>
    <p>จัดการร้านของคุณ — เข้าจากที่ไหนก็ได้</p>
  </div>

  <div class="card" id="form">
    <div id="gbtn-wrap" style="display:none">
      <div id="gbtn" style="display:flex;justify-content:center"></div>
      <div class="divider">หรือใช้อีเมล</div>
    </div>
    <label>อีเมล</label>
    <input id="email" type="email" placeholder="you@email.com" autocomplete="email">
    <label>รหัสผ่าน</label>
    <input id="password" type="password" placeholder="รหัสผ่าน" autocomplete="current-password">
    <div class="err" id="err"></div>
    <button class="go" id="go" onclick="login()">เข้าสู่ระบบ</button>
    <p style="text-align:center;margin-top:14px;font-size:13px;color:var(--mut)">ยังไม่มีร้าน? <a href="/signup/">เปิดร้านใหม่</a></p>
    <p style="text-align:center;margin-top:6px;font-size:13px"><a href="#" onclick="showForgot(event)">ลืมรหัสผ่าน?</a></p>
  </div>

  <div class="card" id="forgot-form" style="display:none">
    <h2 style="font-size:17px;font-weight:600;margin:0 0 14px">รีเซ็ตรหัสผ่าน</h2>
    <label>อีเมลที่ใช้สมัคร</label>
    <input id="forgot-email" type="email" placeholder="you@email.com" autocomplete="email">
    <div class="err" id="forgot-err"></div>
    <button class="go" id="forgot-go" onclick="forgotPw()">ส่งลิงก์รีเซ็ต</button>
    <p style="text-align:center;margin-top:12px;font-size:13px"><a href="#" onclick="showLogin(event)">← กลับ</a></p>
  </div>

  <div class="card" id="reset-form" style="display:none">
    <h2 style="font-size:17px;font-weight:600;margin:0 0 14px">ตั้งรหัสผ่านใหม่</h2>
    <label>รหัสผ่านใหม่ (อย่างน้อย 6 ตัวอักษร)</label>
    <input id="new-pw" type="password" placeholder="รหัสผ่านใหม่" autocomplete="new-password">
    <div class="err" id="reset-err"></div>
    <button class="go" id="reset-go" onclick="resetPw()">บันทึกรหัสผ่าน</button>
  </div>

  <div class="card" id="chooser" style="display:none">
    <p style="font-size:14px;font-weight:500;margin:0 0 12px">เลือกร้านที่จะเข้า</p>
    <div id="shops"></div>
  </div>
</div>

<script>
const $=(id)=>document.getElementById(id);
let _creds=null;
function go(url){ location.href=url; }
function handle(d){ if(d.url){ go(d.url); return; } if(d.choose){ showChooser(d.choose); } }
function showChooser(list){ $('form').style.display='none'; $('chooser').style.display='';
  $('shops').innerHTML=list.map(s=>`<div class="shop" onclick="pick('${s.slug}')"><span style="font-weight:500">${(s.name||'').replace(/[<>&]/g,'')}</span><span style="color:var(--mut)">/b/${s.slug}</span></div>`).join(''); }
window.pick=async(slug)=>{ try{ const body=_creds.credential?{credential:_creds.credential,slug}:{email:_creds.email,password:_creds.password,slug};
  const path=_creds.credential?'/api/owner/google':'/api/owner/login';
  const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); const d=await r.json(); if(d.url) go(d.url); }catch(e){} };
window.login=async()=>{ const email=$('email').value.trim(), password=$('password').value; $('err').textContent='';
  if(!email||!password){ $('err').textContent='กรอกอีเมลและรหัสผ่าน'; return; }
  $('go').disabled=true; $('go').textContent='กำลังเข้า…';
  try{ const r=await fetch('/api/owner/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error||'login_failed'); _creds={email,password}; handle(d);
  }catch(e){ $('err').textContent = e.message==='no_match'?'อีเมลหรือรหัสผ่านไม่ถูกต้อง':e.message==='too_many'?'พยายามบ่อยเกินไป ลองใหม่ภายหลัง':('เข้าไม่ได้: '+e.message); $('go').disabled=false; $('go').textContent='เข้าสู่ระบบ'; }
  };
$('password').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
function showLogin(e){ if(e) e.preventDefault(); $('form').style.display=''; $('forgot-form').style.display='none'; $('reset-form').style.display='none'; }
function showForgot(e){ if(e) e.preventDefault(); $('form').style.display='none'; $('forgot-form').style.display=''; $('forgot-err').textContent=''; $('forgot-email').value=''; setTimeout(()=>$('forgot-email').focus(),50); }
window.forgotPw=async()=>{
  const email=$('forgot-email').value.trim(); $('forgot-err').textContent='';
  if(!email){ $('forgot-err').textContent='กรอกอีเมล'; return; }
  $('forgot-go').disabled=true; $('forgot-go').textContent='กำลังส่ง…';
  try{ await fetch('/api/owner/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    $('forgot-form').innerHTML='<p style="text-align:center;padding:10px 0">✅ หากอีเมลนี้มีบัญชีอยู่ในระบบ ลิงก์รีเซ็ตจะถูกส่งไปยัง<br><b>'+email+'</b><br><br><small>กรุณาตรวจสอบกล่องขาเข้า (และโฟลเดอร์ Spam)</small></p>';
  }catch(e){ $('forgot-err').textContent='ส่งไม่สำเร็จ ลองใหม่'; $('forgot-go').disabled=false; $('forgot-go').textContent='ส่งลิงก์รีเซ็ต'; }
};
window.resetPw=async()=>{
  const pw=$('new-pw').value; $('reset-err').textContent='';
  if(pw.length<6){ $('reset-err').textContent='รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'; return; }
  $('reset-go').disabled=true; $('reset-go').textContent='กำลังบันทึก…';
  const token=new URLSearchParams(location.search).get('reset');
  try{ const r=await fetch('/api/owner/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:pw})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error||'failed');
    $('reset-form').innerHTML='<p style="text-align:center;padding:10px 0">✅ ตั้งรหัสผ่านใหม่สำเร็จ<br><br><a href="/login/">เข้าสู่ระบบ</a></p>';
  }catch(e){ $('reset-err').textContent=e.message==='token_invalid_or_expired'?'ลิงก์หมดอายุหรือใช้ไปแล้ว — ขอลิงก์ใหม่':'บันทึกไม่สำเร็จ'; $('reset-go').disabled=false; $('reset-go').textContent='บันทึกรหัสผ่าน'; }
};
// Show a banner for email-change verification outcomes.
(()=>{ const msg=new URLSearchParams(location.search).get('msg'); if(!msg) return;
  const el=document.createElement('div');
  el.style.cssText='background:'+(msg==='email_changed'?'#ecfdf5;color:#065f46;border:1px solid #a7f3d0':'#fef2f2;color:#991b1b;border:1px solid #fecaca')+';border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:14px;text-align:center';
  el.textContent=msg==='email_changed'?'✅ เปลี่ยนอีเมลสำเร็จแล้ว — เข้าสู่ระบบด้วยอีเมลใหม่':'❌ ลิงก์ยืนยันอีเมลหมดอายุหรือไม่ถูกต้อง — ขอลิงก์ใหม่ในหน้าตั้งค่า';
  document.querySelector('.wrap').insertBefore(el, document.querySelector('.hero'));
})();
// Auto-show reset form when ?reset=<token> is present in URL.
(()=>{ const token=new URLSearchParams(location.search).get('reset'); if(!token) return;
  fetch('/api/owner/reset-check?token='+encodeURIComponent(token)).then(r=>r.json()).then(d=>{
    if(d.ok){ $('form').style.display='none'; $('reset-form').style.display=''; }
    else { $('err').textContent='ลิงก์รีเซ็ตหมดอายุหรือไม่ถูกต้อง — ขอลิงก์ใหม่ด้านล่าง'; }
  }).catch(()=>{});
})();
(async()=>{ try{ const c=await (await fetch('/api/owner/config')).json(); if(!c.googleClientId) return;
  const s=document.createElement('script'); s.src='https://accounts.google.com/gsi/client'; s.async=true; s.defer=true;
  s.onload=()=>{ try{ google.accounts.id.initialize({ client_id:c.googleClientId, callback:async(resp)=>{
      try{ const r=await fetch('/api/owner/google',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({credential:resp.credential})});
        const d=await r.json(); if(r.ok){ _creds={credential:resp.credential}; handle(d); } else { $('err').textContent=d.error==='no_shop'?'อีเมลนี้ยังไม่มีร้าน — สมัครก่อน':'เข้าด้วย Google ไม่สำเร็จ'; }
      }catch(e){ $('err').textContent='เข้าด้วย Google ไม่สำเร็จ'; } } });
    google.accounts.id.renderButton($('gbtn'),{theme:'outline',size:'large',width:330,text:'signin_with',locale:'th'});
    $('gbtn-wrap').style.display=''; }catch(e){} };
  document.head.appendChild(s);
}catch(e){} })();
</script>
<script defer src="/assets/consent.js"></script>
</body></html>
