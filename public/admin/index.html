<!doctype html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Platform Admin — Tenants</title>
<link rel="stylesheet" href="/assets/styles.css">
<style>
  .wrap{max-width:920px;margin:0 auto;padding:18px}
  h1{color:var(--navy)}
  .gate{max-width:340px;margin:40px auto;text-align:center}
  .gate input{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:16px;text-align:center;margin:10px 0;box-sizing:border-box}
  table{width:100%;border-collapse:collapse;font-size:14px;margin-top:14px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:12px;font-weight:700}
  td .slug{color:var(--muted);font-size:12px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px}
  .pill.live{background:rgba(47,194,166,.16);color:#178a72}
  .pill.susp{background:rgba(229,91,107,.16);color:#c0394a}
  .pill.pkg{background:rgba(0,181,216,.14);color:#0b7d96}
  .act button{font-size:12px;padding:5px 9px;margin-left:4px}
  .err{color:#c0394a;font-size:13px;min-height:18px}
  .bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
</style>
</head><body>
<div class="wrap">
  <div id="gate" class="gate card">
    <h1>Platform Admin</h1>
    <p class="muted">จัดการแบรนด์ลูกค้าทั้งหมด</p>
    <input id="pin" type="password" placeholder="Admin PIN" autocomplete="off">
    <input id="totp" inputmode="numeric" maxlength="6" placeholder="รหัส 2FA (6 หลัก)" autocomplete="off" style="display:none">
    <div class="err" id="gerr"></div>
    <button class="btn" style="width:100%" onclick="login()">เข้าสู่ระบบ</button>
  </div>

  <div id="panel" style="display:none">
    <div class="bar">
      <h1>Tenants <span class="muted" id="count" style="font-size:14px;font-weight:400"></span></h1>
      <div style="display:flex;gap:8px">
        <button class="btn ghost" style="padding:6px 12px" onclick="loadAudit()">📜 บันทึกการใช้งาน</button>
        <button class="btn ghost" style="padding:6px 12px" onclick="load()">↻ รีเฟรช</button>
      </div>
    </div>
    <div class="err" id="err"></div>
    <table>
      <thead><tr><th>ร้าน</th><th>แพ็กเกจ</th><th>แพลน</th><th>สาขา</th><th>ออเดอร์/เดือน</th><th>สถานะ</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="auditPanel" style="display:none;margin-top:18px">
      <div class="bar"><h1 style="font-size:18px">📜 บันทึกการใช้งาน (audit) <span class="muted" id="auditCount" style="font-size:13px;font-weight:400"></span></h1>
        <button class="btn ghost" style="padding:6px 12px" onclick="$('auditPanel').style.display='none'">✕ ปิด</button></div>
      <div class="muted" style="font-size:12px;margin-bottom:6px">การกระทำที่อ่อนไหว (ระงับ/เปลี่ยนแพลน/รีเซ็ต PIN/แก้ LINE/PDPA) — ไม่เก็บข้อมูลลับ (token/PIN ไม่ถูกบันทึก)</div>
      <table><thead><tr><th>เวลา</th><th>ร้าน</th><th>ผู้กระทำ</th><th>การกระทำ</th><th>รายละเอียด</th><th>IP</th></tr></thead>
        <tbody id="auditRows"></tbody></table>
    </div>
  </div>
</div>

<script>
const $=(id)=>document.getElementById(id);
let PIN='';
async function api(path,opts={}){ opts.headers=Object.assign({'Content-Type':'application/json','x-admin-pin':PIN},opts.headers||{});
  const r=await fetch(path,opts); if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||r.status); } return r.json(); }
window.login=async()=>{ PIN=$('pin').value.trim(); $('gerr').textContent='';
  const totp=$('totp').value.trim();
  try{ const d=await api('/admin/api/login',{method:'POST',body:JSON.stringify(totp?{totp}:{})});
    if(!d.ok){
      if(d.totpRequired){ $('totp').style.display=''; $('totp').focus();
        $('gerr').textContent = d.error==='bad_totp' ? 'รหัส 2FA ไม่ถูกต้อง' : 'กรอกรหัส 2FA จากแอป Authenticator';
      } else { $('gerr').textContent='PIN ไม่ถูกต้อง'; }
      return;
    }
    $('gate').style.display='none'; $('panel').style.display=''; load();
  }catch(e){ $('gerr').textContent='เข้าไม่ได้: '+e.message; } };
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let TENANTS=[];
window.load=async()=>{ $('err').textContent='';
  try{ const d=await api('/admin/api/tenants'); const ts=d.tenants||[]; TENANTS=ts; const plans=Object.keys(d.plans||{free:1,pro:1});
    $('count').textContent='('+ts.length+')';
    $('rows').innerHTML=ts.map(t=>`<tr>
      <td><b>${esc(t.name)}</b><div class="slug">/b/${esc(t.slug)}/${t.domain?` · 🌐 ${esc(t.domain)}`:''}</div></td>
      <td><span class="pill pkg">${t.package==='pos'?'POS':'+LINE'}</span></td>
      <td><select onchange="setPlan(${t.id},this.value)" style="padding:4px 6px;border:1px solid var(--line);border-radius:8px;font-size:12px">
        ${plans.map(p=>`<option value="${esc(p)}" ${t.plan===p?'selected':''}>${esc(p)}</option>`).join('')}</select></td>
      <td>${t.stores}</td><td>${t.ordersThisMonth}</td>
      <td><span class="pill ${t.active?'live':'susp'}">${t.active?'ใช้งาน':'ระงับ'}</span></td>
      <td class="act">
        ${t.id!==1?(t.active
          ? `<button class="btn ghost danger" onclick="suspend(${t.id})">ระงับ</button>`
          : `<button class="btn ok" onclick="activate(${t.id})">เปิดใช้</button>`):''}
        <button class="btn ghost" onclick="setDomain(${t.id})">โดเมน</button>
        <button class="btn ghost" onclick="resetPin(${t.id})">รีเซ็ต PIN</button>
      </td></tr>`).join('') || '<tr><td colspan="7" class="muted">ยังไม่มีแบรนด์</td></tr>';
  }catch(e){ $('err').textContent='โหลดไม่ได้: '+e.message; } };
const tById=(id)=>TENANTS.find(t=>t.id===id)||{};
window.setPlan=async(id,plan)=>{ try{ await api('/admin/api/tenants/'+id+'/plan',{method:'POST',body:JSON.stringify({plan})}); load(); }catch(e){ $('err').textContent=e.message; } };
window.setDomain=async(id)=>{ const d=prompt('โดเมนของแบรนด์ (เช่น shop.brand.com) — ว่าง = ลบ\nอย่าลืมชี้ DNS (CNAME) มาที่โฮสต์นี้ + เพิ่มโดเมนใน Render', tById(id).domain||''); if(d===null) return;
  try{ const r=await api('/admin/api/tenants/'+id+'/domain',{method:'POST',body:JSON.stringify({domain:d})}); $('err').textContent=''; load(); }
  catch(e){ $('err').textContent = e.message==='domain_taken'?'โดเมนนี้ถูกใช้แล้ว':(e.message==='bad_domain'?'รูปแบบโดเมนไม่ถูกต้อง':e.message); } };
window.suspend=async(id)=>{ if(!confirm('ระงับแบรนด์นี้? ร้านจะเข้าใช้งานไม่ได้')) return;
  try{ await api('/admin/api/tenants/'+id+'/suspend',{method:'POST',body:'{}'}); load(); }catch(e){ $('err').textContent=e.message; } };
window.activate=async(id)=>{ try{ await api('/admin/api/tenants/'+id+'/activate',{method:'POST',body:'{}'}); load(); }catch(e){ $('err').textContent=e.message; } };
window.resetPin=async(id)=>{ const name=tById(id).name||('#'+id); if(!confirm('รีเซ็ต PIN เจ้าของร้าน "'+name+'"?')) return;
  try{ const d=await api('/admin/api/tenants/'+id+'/reset-pin',{method:'POST',body:'{}'});
    alert('PIN ใหม่ของ "'+name+'": '+d.pin+'\nแจ้งเจ้าของร้านและให้เปลี่ยนทันที'); }catch(e){ $('err').textContent=e.message; } };
const tName=(id)=>{ const t=tById(id); return t.name?esc(t.name):('#'+id); };
window.loadAudit=async()=>{ try{ const d=await api('/admin/api/audit?limit=200'); const ev=d.events||[];
  $('auditCount').textContent='('+ev.length+')';
  $('auditRows').innerHTML = ev.length ? ev.map(e=>{ const dt=new Date(e.at); const ts=isNaN(dt)?'':dt.toLocaleString('th-TH',{hour12:false});
    return `<tr><td style="white-space:nowrap">${esc(ts)}</td><td>${tName(e.tenant_id)}</td><td>${esc(e.actor)}</td><td><code>${esc(e.action)}</code></td><td>${esc(e.detail||'')}</td><td class="muted">${esc(e.ip||'')}</td></tr>`;
  }).join('') : '<tr><td colspan="6" class="muted" style="text-align:center;padding:12px">ยังไม่มีบันทึก</td></tr>';
  $('auditPanel').style.display=''; $('auditPanel').scrollIntoView({behavior:'smooth'}); }catch(e){ $('err').textContent=e.message; } };
$('pin').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
$('totp').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
</script>
</body></html>
