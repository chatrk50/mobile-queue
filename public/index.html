<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mobile Queue</title><link rel="stylesheet" href="/assets/styles.css">
</head><body><div class="wrap">
  <div class="brand"><img class="logo" src="/assets/logo.png" onerror="this.remove()" alt=""> YO-DEE Yogurt</div>
  <div class="card"><h1>Mobile Queue</h1>
    <p class="muted">Scan-and-queue with LINE notifications. Pick a screen:</p>
    <div class="grid" style="margin-top:14px">
      <a class="btn" href="/cashier/"><svg class="ic" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Cashier</a>
      <a class="btn ok" href="/display/"><svg class="ic" viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Display</a>
      <a class="btn ghost" href="/liff/?zone=1"><svg class="ic" viewBox="0 0 24 24"><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/></svg>Customer (zone 1)</a>
      <a class="btn ghost" href="/print/"><svg class="ic" viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>Print posters</a>
    </div>
    <p class="muted" style="margin-top:16px;font-size:13px">Customers normally arrive here by scanning the printed QR (see <code>public/assets/qr/</code>). Run <code>npm run qr</code> to generate them.</p>
  </div>
</div></body></html>
