<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mobile Queue</title><link rel="stylesheet" href="/assets/styles.css">
</head><body><div class="wrap">
  <div class="brand"><img class="logo" src="/assets/logo.png" onerror="this.remove()" alt=""> YO-DEE Yogurt</div>
  <div class="card"><h1>Mobile Queue</h1>
    <p class="muted">Scan-and-queue with LINE notifications. Pick a screen:</p>
    <div class="grid" style="margin-top:14px">
      <a class="btn" href="/cashier/">🧑‍💼 Cashier</a>
      <a class="btn ok" href="/display/">🖥️ Display</a>
      <a class="btn ghost" href="/liff/?zone=1">📱 Customer (zone 1)</a>
    </div>
    <p class="muted" style="margin-top:16px;font-size:13px">Customers normally arrive here by scanning the printed QR (see <code>public/assets/qr/</code>). Run <code>npm run qr</code> to generate them.</p>
  </div>
</div></body></html>
