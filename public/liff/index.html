<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Get a Queue — YO-DEE Yogurt</title>
<link rel="stylesheet" href="/assets/styles.css">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head><body>
<div class="wrap">
  <div class="brand hero"><img class="logo" src="/assets/logo.png" onerror="this.remove();var f=document.getElementById('brandFb');if(f)f.style.display=''" alt=""><div id="brandFb" style="display:none;font-weight:800;color:var(--navy);font-size:20px;letter-spacing:.3px">YO-DEE Yogurt</div></div>

  <!-- STEP: add friend (required before getting a number) -->
  <div id="addCard" class="card" style="display:none;text-align:center">
    <h1>Add us on LINE 💬</h1>
    <p class="muted" style="margin-top:8px">Please add <b>YO-DEE Yogurt</b> as a LINE friend so we can send your queue number and notify you when it's your turn.</p>
    <button style="width:100%;margin-top:16px" onclick="addFriend()">➕ Add LINE friend</button>
    <button class="ghost" style="width:100%;margin-top:10px" onclick="recheckFriend()">I've added — continue</button>
  </div>

  <!-- STEP: get ticket -->
  <div id="getCard" class="card" style="display:none">
    <h2 id="storeName">—</h2>
    <h1 id="zoneName">—</h1>
    <div class="row between">
      <span id="zoneState" class="pill open">Open</span>
      <span class="muted">Waiting <b id="waitingCount">–</b></span>
    </div>
    <button id="getBtn" style="width:100%;margin-top:18px" onclick="getTicket()">Get my number</button>
    <div id="closedMsg" class="closed-note" style="display:none">
      <b>🚫 Closed</b><br>
      <span class="muted">This zone is not accepting queue right now. Please try again later.</span>
    </div>
    <p id="liffNote" class="muted" style="font-size:12px;margin-top:12px"></p>
  </div>

  <!-- STEP: my ticket -->
  <div id="ticketCard" class="card" style="display:none;text-align:center">
    <h2 id="tStore" class="muted">—</h2>
    <p class="muted" style="margin:6px 0;font-size:13px;white-space:nowrap">Your number</p>
    <div class="big-number" id="tCode">—</div>
    <div id="tStatusWrap" style="margin:18px 0">
      <div id="tAheadWrap"><span class="muted">Groups ahead</span>
        <div style="font-size:40px;font-weight:800" id="tAhead">–</div></div>
      <div id="tCalled" style="display:none">
        <span class="pill soon" id="tCalledPill">⏰ Almost your turn</span>
      </div>
    </div>
    <p class="muted" id="tLastCalled" style="font-size:13px"></p>
    <p class="muted" id="tNotifyNote" style="font-size:12px"></p>
    <button class="ghost danger" style="margin-top:10px" onclick="cancelTicket()">Cancel my queue</button>
  </div>

  <div id="errCard" class="card" style="display:none"><b id="errMsg"></b></div>
</div>
<div id="toast" class="toast"></div>

<script type="module">
const qs = new URLSearchParams(location.search);
const zoneId = qs.get('zone');
let cfg = {}, lineUserId = null, displayName = null, ticketId = null, poll = null, inLine = false;

const $ = (id) => document.getElementById(id);
const show = (id, on=true) => $(id).style.display = on ? '' : 'none';
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
async function api(path, opts){const r=await fetch(path,opts);if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||r.status);}return r.json();}
function err(msg){['addCard','getCard','ticketCard'].forEach(x=>show(x,false));show('errCard',true);$('errMsg').textContent=msg;}

async function initLiff(){
  cfg = await api('/api/config');
  if (cfg.liffId && window.liff){
    try{
      await liff.init({ liffId: cfg.liffId });
      if(!liff.isLoggedIn()){ liff.login(); return; }
      inLine = true;
      const p = await liff.getProfile();
      lineUserId = p.userId; displayName = p.displayName;
      $('liffNote').textContent = `Signed in to LINE as ${p.displayName}`;
    }catch(e){ $('liffNote').textContent = 'LIFF init failed — test mode (no LINE id).'; }
  } else {
    lineUserId = localStorage.getItem('demoUid') || ('demo-'+Math.random().toString(36).slice(2,9));
    localStorage.setItem('demoUid', lineUserId);
    $('liffNote').textContent = 'Test mode (LINE not enabled) — demo user '+lineUserId;
  }
}

async function isFriend(){
  if(!inLine || !liff.getFriendship) return true;       // can't check -> don't block
  try{ const fs = await liff.getFriendship(); return !!fs.friendFlag; }
  catch(e){ return true; }                               // fail open if channel not linked
}
window.addFriend = ()=>{
  const url = cfg.addFriendUrl; if(!url){ toast('Add-friend link not configured'); return; }
  if(inLine && liff.openWindow){ liff.openWindow({ url, external: true }); } else { location.href = url; }
};
window.recheckFriend = async ()=>{
  if(await isFriend()){ show('addCard',false); await proceed(); }
  else { toast("You're not a friend yet — tap “Add LINE friend”"); }
};

async function loadZone(){
  if(!zoneId) return err('No zone in the QR code.');
  const z = await api('/api/zones/'+zoneId);
  const snap = await api('/api/zones/'+zoneId+'/snapshot');
  const stores = await api('/api/stores');
  const store = stores.find(s=>s.id===z.store_id);
  $('storeName').textContent = store ? store.name : '';
  $('zoneName').textContent = z.name;
  $('waitingCount').textContent = snap.waitingCount;
  const open = z.is_open===1;
  $('zoneState').className = 'pill '+(open?'open':'closed');
  $('zoneState').textContent = open?'Open':'Closed';
  show('getBtn', open);
  show('closedMsg', !open);
  show('getCard',true);
}

window.getTicket = async ()=>{
  $('getBtn').disabled=true;
  try{
    const r = await api('/api/zones/'+zoneId+'/tickets',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({partySize:1,lineUserId,customerName:displayName})});
    ticketId = r.ticketId;
    localStorage.setItem('ticket_'+zoneId, ticketId);
    show('getCard',false); show('ticketCard',true);
    startPolling();
  }catch(e){ $('getBtn').disabled=false; toast('Could not get a number: '+e.message); }
};

function render(v){
  $('tCode').textContent = v.code;
  $('tStore').textContent = v.zone;
  $('tLastCalled').textContent = v.last_called ? ('Now serving: '+v.last_called) : '';
  if(v.status==='waiting'){
    show('tAheadWrap',true); show('tCalled',false);
    $('tAhead').textContent = v.ahead;
    $('tNotifyNote').textContent = cfg.lineEnabled
      ? `We'll message you on LINE when ${cfg.threshold} groups are left`
      : `(test mode) notify at ${cfg.threshold} groups left — see server log`;
  } else if(v.status==='called'){
    show('tAheadWrap',false); show('tCalled',true);
    $('tCalledPill').textContent="🔔 It's your turn!";
    $('tNotifyNote').textContent='Please come to the counter.';
  } else {
    $('tNotifyNote').textContent='Status: '+v.status;
  }
}

async function tick(){
  try{ const v = await api('/api/tickets/'+ticketId); render(v);
    if(['served','cancelled','skipped'].includes(v.status)){ clearInterval(poll); }
  }catch(e){}
}
function startPolling(){ tick(); poll=setInterval(tick,3000); }

window.cancelTicket = async ()=>{
  if(!confirm('Cancel your queue?')) return;
  try{ await api('/api/tickets/'+ticketId+'/cancel',{method:'POST'}); clearInterval(poll);
    localStorage.removeItem('ticket_'+zoneId);
    show('ticketCard',false); show('getCard',true); $('getBtn').disabled=false; loadZone();
  }catch(e){ toast(e.message); }
};

async function proceed(){
  await loadZone();
  let resumeId = null;
  if(lineUserId){ try{ const r=await api('/api/zones/'+zoneId+'/my-ticket',
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lineUserId})});
    if(r.ticket) resumeId=r.ticket.id; }catch(e){} }
  if(!resumeId) resumeId = localStorage.getItem('ticket_'+zoneId);
  if(resumeId){ try{ const v=await api('/api/tickets/'+resumeId);
    if(['waiting','called'].includes(v.status)){ ticketId=resumeId; localStorage.setItem('ticket_'+zoneId,resumeId);
      show('getCard',false); show('ticketCard',true); startPolling(); }
    else localStorage.removeItem('ticket_'+zoneId); }catch(e){ localStorage.removeItem('ticket_'+zoneId); } }
}

(async ()=>{
  await initLiff();
  if(cfg.lineEnabled && inLine && cfg.addFriendUrl && !(await isFriend())){ show('addCard',true); return; }
  await proceed();
})().catch(e=>err(e.message));
</script>
</body></html>
