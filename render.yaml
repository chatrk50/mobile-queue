# Render Blueprint for Mobile Queue
# Deploy: Render Dashboard -> New -> Blueprint -> connect this repo.
# Render's free disk is wiped on restart, so we re-seed on each boot
# (seed.js is idempotent: it skips if the store already exists).
services:
  - type: web
    name: mobile-queue
    runtime: node
    plan: free
    region: singapore        # closest Render region to Thailand
    branch: main
    buildCommand: npm install
    startCommand: npm run seed && npm start
    healthCheckPath: /cashier/
    envVars:
      - key: NODE_VERSION
        value: "22.17.0"      # node:sqlite + --experimental-sqlite need >= 22.5
      - key: NOTIFY_THRESHOLD
        value: "2"
      - key: WAIT_PER_GROUP_MIN
        value: "4"     # estimated minutes per group ahead (customer ETA)
      - key: PUBLIC_BASE_URL
        value: https://mobile-queue.onrender.com
      - key: CASHIER_PIN
        sync: false           # you set this in the Render UI (don't use 1234 in public)
      - key: LIFF_ID
        value: 2010308807-nrzjBCPa   # not secret (exposed client-side anyway)
      - key: LINE_ADD_FRIEND_URL
        value: https://line.me/R/ti/p/@138dccus   # OA add-friend deep link (not secret)
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false           # secret — paste in Render dashboard, never in git
      - key: LINE_CHANNEL_SECRET
        sync: false           # secret — paste in Render dashboard, never in git
      # --- DURABLE STORAGE (optional) ---------------------------------------
      # Leave BOTH blank → app uses local node:sqlite (ephemeral on free tier).
      # Set BOTH (from a free Turso DB — see docs/durable-db-turso.md) → sales
      # history + all data survive restarts via a libSQL embedded replica.
      - key: TURSO_DATABASE_URL
        sync: false           # e.g. libsql://mobile-queue-<you>.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false           # secret token from `turso db tokens create`
